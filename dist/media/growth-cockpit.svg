<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MoodTech Growth Cockpit</title>
  <desc id="desc">A performance cockpit visual with traffic, conversion, and automation metrics rising after launch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070c"/>
      <stop offset="0.46" stop-color="#101118"/>
      <stop offset="1" stop-color="#030509"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.48" stop-color="#00f3cc"/>
      <stop offset="1" stop-color="#27f570"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <pattern id="dash" width="78" height="78" patternUnits="userSpaceOnUse">
      <path d="M0 78V0H78" fill="none" stroke="#fff" stroke-opacity="0.045"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#dash)"/>

  <g transform="translate(80 70)">
    <text x="0" y="0" font-family="Roboto Mono, Consolas, monospace" font-size="14" fill="#f9c846" font-weight="700">GROWTH COCKPIT</text>
    <text x="0" y="52" font-family="Outfit, Arial, sans-serif" font-size="48" fill="#f8fafc" font-weight="850">Nach dem Launch wird gemessen.</text>
    <text x="0" y="86" font-family="Inter, Arial, sans-serif" font-size="17" fill="#aab4c4">Traffic, Rankings, Anfragen und Routine-Zeit in einer klaren Kontrollsicht.</text>
  </g>

  <g transform="translate(78 184)">
    <rect width="724" height="402" rx="14" fill="#070b12" fill-opacity="0.76" stroke="#fff" stroke-opacity="0.11"/>
    <g transform="translate(56 48)" stroke="#fff" stroke-opacity="0.08">
      <path d="M0 250H600 M0 190H600 M0 130H600 M0 70H600"/>
      <path d="M0 0V280 M120 0V280 M240 0V280 M360 0V280 M480 0V280 M600 0V280"/>
    </g>
    <path d="M134 438 C220 404 242 318 326 318 C416 318 448 240 520 242 C614 244 638 142 728 112"
          fill="none" stroke="url(#chart)" stroke-width="7" stroke-linecap="round"/>
    <path d="M134 438 C220 404 242 318 326 318 C416 318 448 240 520 242 C614 244 638 142 728 112"
          fill="none" stroke="#00f3cc" stroke-opacity="0.32" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>
    <circle cx="728" cy="112" r="10" fill="#27f570"/>
    <text x="54" y="346" fill="#9aa4b6" font-family="Roboto Mono, Consolas, monospace" font-size="13">Woche 1</text>
    <text x="624" y="346" fill="#9aa4b6" font-family="Roboto Mono, Consolas, monospace" font-size="13">Woche 12</text>
  </g>

  <g transform="translate(860 184)" font-family="Outfit, Arial, sans-serif">
    <rect width="338" height="112" rx="12" fill="#070b12" fill-opacity="0.8" stroke="#00f3cc" stroke-opacity="0.18"/>
    <text x="24" y="37" fill="#9aa4b6" font-family="Roboto Mono, Consolas, monospace" font-size="13">QUALIFIED REQUESTS</text>
    <text x="24" y="86" fill="#f8fafc" font-size="52" font-weight="900">+45%</text>
    <rect y="144" width="338" height="112" rx="12" fill="#070b12" fill-opacity="0.8" stroke="#6366f1" stroke-opacity="0.2"/>
    <text x="24" y="181" fill="#9aa4b6" font-family="Roboto Mono, Consolas, monospace" font-size="13">TIME RECOVERED</text>
    <text x="24" y="230" fill="#f8fafc" font-size="52" font-weight="900">8h</text>
    <rect y="288" width="338" height="112" rx="12" fill="#070b12" fill-opacity="0.8" stroke="#f9c846" stroke-opacity="0.18"/>
    <text x="24" y="325" fill="#9aa4b6" font-family="Roboto Mono, Consolas, monospace" font-size="13">PERFORMANCE TARGET</text>
    <text x="24" y="374" fill="#f8fafc" font-size="52" font-weight="900">90+</text>
  </g>
</svg>
