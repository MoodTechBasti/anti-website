<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MoodTech Automation Control Room</title>
  <desc id="desc">A dark operational dashboard showing automated lead intake, CRM sync, follow-up, and reporting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06070c"/>
      <stop offset="0.5" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#030509"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f3cc"/>
      <stop offset="0.5" stop-color="#27f570"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#fff" stroke-opacity="0.045" fill="none"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect x="72" y="62" width="1136" height="596" rx="14" fill="#050912" fill-opacity="0.74" stroke="#fff" stroke-opacity="0.11"/>
  <rect x="72" y="62" width="1136" height="54" rx="14" fill="#ffffff" fill-opacity="0.035"/>
  <circle cx="102" cy="89" r="6" fill="#ff5f56"/>
  <circle cx="124" cy="89" r="6" fill="#ffbd2e"/>
  <circle cx="146" cy="89" r="6" fill="#27c93f"/>
  <text x="188" y="96" font-family="Roboto Mono, Consolas, monospace" font-size="15" fill="#9aa4b6">moodtech/control-room/live</text>

  <g transform="translate(112 160)">
    <text x="0" y="0" font-family="Roboto Mono, Consolas, monospace" font-size="14" fill="#00f3cc" font-weight="700">AUTOMATION PIPELINE</text>
    <text x="0" y="44" font-family="Outfit, Arial, sans-serif" font-size="40" fill="#f8fafc" font-weight="850">Anfrage rein. System arbeitet.</text>
    <text x="0" y="76" font-family="Inter, Arial, sans-serif" font-size="16" fill="#aab4c4">Website, Mail, Kalender und CRM laufen als ein Takt.</text>
  </g>

  <g transform="translate(130 292)" font-family="Outfit, Arial, sans-serif">
    <path d="M116 62H906" stroke="url(#wire)" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
    <g fill="#070b12" stroke="#fff" stroke-opacity="0.13">
      <rect x="0" y="0" width="190" height="124" rx="12"/>
      <rect x="260" y="0" width="190" height="124" rx="12"/>
      <rect x="520" y="0" width="190" height="124" rx="12"/>
      <rect x="780" y="0" width="190" height="124" rx="12"/>
    </g>
    <g font-size="18" fill="#f8fafc" font-weight="750">
      <text x="28" y="49">Lead erkannt</text>
      <text x="288" y="49">Score gebaut</text>
      <text x="548" y="49">Antwort raus</text>
      <text x="808" y="49">CRM gepflegt</text>
    </g>
    <g font-size="13" fill="#9aa4b6" font-family="Inter, Arial, sans-serif">
      <text x="28" y="82">Formular, Telefon, Mail</text>
      <text x="288" y="82">Intent + Standort</text>
      <text x="548" y="82">Follow-up in Minuten</text>
      <text x="808" y="82">Status ohne Copy-Paste</text>
    </g>
    <g fill="#00f3cc" filter="url(#soft)" opacity="0.8">
      <circle cx="95" cy="62" r="24"/>
      <circle cx="615" cy="62" r="20"/>
    </g>
    <g fill="#00f3cc">
      <circle cx="95" cy="62" r="8"/>
      <circle cx="355" cy="62" r="8"/>
      <circle cx="615" cy="62" r="8"/>
      <circle cx="875" cy="62" r="8"/>
    </g>
  </g>

  <g transform="translate(112 500)" font-family="Roboto Mono, Consolas, monospace" font-size="13">
    <rect width="480" height="110" rx="10" fill="#070b12" fill-opacity="0.78" stroke="#00f3cc" stroke-opacity="0.14"/>
    <text x="22" y="32" fill="#27f570">[09:16:03] lead.created  source=website</text>
    <text x="22" y="58" fill="#00f3cc">[09:16:04] crm.sync      status=qualified</text>
    <text x="22" y="84" fill="#f9c846">[09:16:06] followup.sent channel=email</text>
  </g>

  <g transform="translate(760 500)" font-family="Inter, Arial, sans-serif">
    <rect width="354" height="110" rx="10" fill="#070b12" fill-opacity="0.78" stroke="#fff" stroke-opacity="0.12"/>
    <text x="24" y="34" fill="#9aa4b6" font-size="14">Response Window</text>
    <text x="24" y="78" fill="#f8fafc" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="850">04 min</text>
    <path d="M204 76 C238 22 282 42 330 24" stroke="#00f3cc" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
